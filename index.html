<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
<title>envoria.rip</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bg: #0a0b0d;
    --line: #2a2c31;
    --accent: #7c5cff;
    --cyan: #4fe0d0;
    --text: #e8e9ec;
    --text-dim: #83878f;
    --text-faint: #4a4d53;
  }

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--bg);
    background-image:
      repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 14px);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  canvas#net{
    position: fixed;
    inset: 0;
    z-index: 0;
    display: block;
  }

  header{
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    width: calc(100% - 24px);
    max-width: 880px;
  }

  nav{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 18px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(10,11,13,0.25);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
  }

  .brand{
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: -0.02em;
  }

  .nav-links{
    display:flex;
    align-items:center;
    gap: 22px;
  }

  .nav-links a{
    color: var(--text-dim);
    text-decoration: none;
    font-size: 12.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    transition: color 0.2s ease;
  }

  .nav-links a:hover{ color: var(--text); }

  .profile-chip{
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--text-dim);
  }

  .profile-chip img{
    width: 22px;
    height: 22px;
    border-radius: 50%;
    object-fit: cover;
  }

  .profile-chip .uname{ color: var(--text); font-weight: 600; }

  .profile-chip .uid{
    color: var(--text-faint);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .nav-cta{
    color: #05060a !important;
    background: var(--accent);
    padding: 8px 16px;
    border-radius: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .nav-cta:hover{ color: #05060a !important; background: #8f74ff; }

  @media (max-width: 640px){
    .nav-links a:not(.nav-cta):not(.nav-login){ display:none; }
  }

  section.hero{
    position: relative;
    z-index: 1;
    min-height: 100svh;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding: 110px 20px 60px;
    pointer-events: none;
  }

  .hero > *{ pointer-events: auto; }

  h1.typing{
    font-family: 'JetBrains Mono', monospace;
    font-weight: 800;
    font-size: clamp(2.6rem, 9vw, 6rem);
    letter-spacing: -0.03em;
    white-space: nowrap;
    border-right: 3px solid var(--text);
    display: inline-block;
    overflow: hidden;
    width: 0;
    animation:
      typeit 1.4s steps(8) 0.3s forwards,
      blinkcursor 0.8s step-end infinite;
  }

  @keyframes typeit{
    from{ width: 0; }
    to{ width: 8.4ch; }
  }

  @keyframes blinkcursor{
    50%{ border-color: transparent; }
  }

  .tagline{
    margin-top: 22px;
    font-size: clamp(1rem, 2.4vw, 1.4rem);
    font-weight: 400;
    color: var(--text-dim);
  }

  .subtag{
    margin: 14px auto 0;
    max-width: 480px;
    font-size: 0.92rem;
    color: var(--text-faint);
  }

  .hero-cta{
    margin-top: 40px;
    display:flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn{
    display:inline-flex;
    align-items:center;
    gap: 8px;
    padding: 13px 28px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-decoration: none;
    transition: all 0.2s ease;
    border: 1px solid transparent;
  }

  .btn-solid{
    background: var(--text);
    color: #05060a;
  }

  .btn-solid:hover{ background: #cfd1d6; }

  section.devs{
    position: relative;
    z-index: 1;
    padding: 40px 20px 100px;
    text-align: center;
  }

  section.devs h2{
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.5rem, 3.5vw, 2.1rem);
    margin-bottom: 40px;
  }

  .dev-list{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 32px;
  }

  .dev-card{
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .dev-pfp{
    width: 92px;
    height: 92px;
    border-radius: 50%;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.15);
  }

  .dev-pfp img{
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .dev-name{
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.95rem;
  }

  .dev-role{
    font-size: 0.75rem;
    color: var(--text-faint);
  }

  section.contact{
    position: relative;
    z-index: 1;
    padding: 0 20px 120px;
    text-align: center;
  }

  section.contact h2{
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(1.5rem, 3.5vw, 2.1rem);
    margin-bottom: 14px;
  }

  section.contact p{
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  .discord-link{
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.08);
    text-decoration: none;
    color: var(--text);
    font-weight: 600;
    font-size: 0.9rem;
    transition: border-color 0.2s ease;
  }

  .discord-link:hover{
    border-color: rgba(255,255,255,0.25);
  }

  .discord-link img{
    width: 22px;
    height: 22px;
  }
</style>
</head>
<body>

<canvas id="net"></canvas>

<header>
  <nav>
    <div class="brand">envoria</div>
    <div class="nav-links" id="navLinks">
      <a href="https://jnqhfbwn-envoria.akambemitchell.workers.dev/login" class="nav-login" id="loginLink">Login</a>
    </div>
  </nav>
</header>

<section class="hero">
  <h1 class="typing">envoria</h1>
  <p class="tagline">A hybrid client built for people who take their PvP seriously.</p>
  <p class="subtag">Clean HUD, deep customization, and a feature set that grows every patch.</p>
  <div class="hero-cta">
    <a href="https://discord.gg/REPLACE_ME" class="btn btn-solid">Buy Client</a>
  </div>
</section>

<section class="devs">
  <h2>Dev list</h2>
  <div class="dev-list">
    <div class="dev-card">
      <div class="dev-pfp">
        <img src="img/envoh.jpeg" alt="ball knowledge" />
      </div>
      <div class="dev-name">ball knowledge</div>
      <div class="dev-role">Developer</div>
    </div>
  </div>
</section>

<section class="contact">
  <h2>Contact</h2>
  <p>Join discord server to get early access</p>
  <a href="https://discord.gg/REPLACE_ME" class="discord-link">
    <img src="img/discord.png" alt="Discord" />
    Join the Discord
  </a>
</section>

<script>
const canvas = document.getElementById('net');
const ctx = canvas.getContext('2d');
let w, h, dots, mouse = { x: -9999, y: -9999, active: false };

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  const count = Math.floor((w * h) / 7000);
  dots = Array.from({ length: count }, () => ({
    x: Math.random() * w,
    y: Math.random() * h,
    vx: (Math.random() - 0.5) * 0.35,
    vy: (Math.random() - 0.5) * 0.35
  }));
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('mouseleave', () => { mouse.active = false; });

function step(){
  ctx.clearRect(0, 0, w, h);

  for(const d of dots){
    d.x += d.vx;
    d.y += d.vy;
    if(d.x < 0 || d.x > w) d.vx *= -1;
    if(d.y < 0 || d.y > h) d.vy *= -1;
  }

  const linkDist = 190;
  const mouseDist = 200;

  for(let i = 0; i < dots.length; i++){
    for(let j = i + 1; j < dots.length; j++){
      const a = dots[i], b = dots[j];
      const dx = a.x - b.x, dy = a.y - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if(dist < linkDist){
        ctx.strokeStyle = 'rgba(232,233,236,' + (0.22 * (1 - dist / linkDist)) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }
    }

    if(mouse.active){
      const dx = dots[i].x - mouse.x, dy = dots[i].y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if(dist < mouseDist){
        ctx.strokeStyle = 'rgba(232,233,236,' + (0.55 * (1 - dist / mouseDist)) + ')';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(dots[i].x, dots[i].y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.stroke();
      }
    }

    ctx.fillStyle = 'rgba(232,233,236,0.55)';
    ctx.beginPath();
    ctx.arc(dots[i].x, dots[i].y, 1.6, 0, Math.PI * 2);
    ctx.fill();
  }

  requestAnimationFrame(step);
}

resize();
step();

fetch("https://jnqhfbwn-envoria.akambemitchell.workers.dev/me", { credentials: "include" })
  .then(res => res.json())
  .then(data => {
    if (!data.loggedIn) return;
    const navLinks = document.getElementById("navLinks");
    navLinks.innerHTML =
      '<div class="profile-chip">' +
        '<img src="' + data.avatar + '" alt="' + data.username + '" />' +
        '<span class="uname">' + data.username + '</span>' +
        '<span class="uid">' + data.id + '</span>' +
      '</div>';
  })
  .catch(() => {});
</script>

</body>
</html>
